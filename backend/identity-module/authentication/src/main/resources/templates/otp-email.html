<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
</head>

<body style="margin:0; padding:0; background-color:#eef2f7; font-family: Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
    <tr>
        <td align="center">

            <!-- Card Container -->
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background:#ffffff; padding:40px; border-radius:12px;
                          box-shadow:0 6px 20px rgba(0,0,0,0.06);">

                <tr>
                    <td align="center">

                        <h2 style="margin:0; color:#1f2937; font-size:24px;">
                            SmartPlatform OTP Verification
                        </h2>

                        <p style="margin-top:15px; color:#4b5563; font-size:15px;">
                            Use the One-Time Password below to complete your verification.
                        </p>

                        <!-- OTP Box -->
                        <div style="margin:35px 0;">

                            <div style="
                                display:inline-block;
                                padding:18px 40px;
                                font-size:32px;
                                font-weight:700;
                                letter-spacing:8px;
                                background:#f3f6ff;
                                color:#2a4bff;
                                border-radius:10px;
                                border:1px solid #dce3ff;
                            "
                                 th:text="${otp}">
                                123456
                            </div>

                        </div>

                        <p style="color:#6b7280; font-size:14px;">
                            This OTP will expire in
                            <strong th:text="${otpExpireTime}"></strong>minutes.
                        </p>

                        <p style="color:#9ca3af; font-size:13px;">
                            If you did not request this OTP, you can safely ignore this email.
                        </p>

                        <hr style="margin:35px 0; border:none; border-top:1px solid #e5e7eb;">

                        <p style="color:#c0c4cc; font-size:12px; margin:0;">
                            © 2026 SmartPlatform. All rights reserved.
                        </p>

                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
